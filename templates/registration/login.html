

{% extends 'registration/base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="text-center mb-3">
                    <img src="{% static 'core/images/logo.png' %}" alt="Poulina Group Holding" style="height: 60px;">
                </div>
                <h2 class="text-center mb-4">Connexion</h2>
                <form method="post">
                    {% csrf_token %}
                    {% if form.non_field_errors %}
                    <div class="alert alert-danger">
                        {% for error in form.non_field_errors %}
                        {{ error }}
                        {% endfor %}
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">Nom d'utilisateur</label>
                        <input type="text" name="username" class="form-control" id="{{ form.username.id_for_label }}"
                            required>
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label">Mot de passe</label>
                        <input type="password" name="password" class="form-control"
                            id="{{ form.password.id_for_label }}" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Se connecter</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p>Pas encore de compte ? <a href="{% url 'signup' %}">S'inscrire</a></p>
                    <p><a href="/admin/">Connexion Admin</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
